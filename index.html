<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gemini Chat</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 40px;
        }

        #chat {
            background: white;
            height: 350px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
        }

        .ai {
            color: green;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <h2>Gemini AI Chatbot</h2>

    <div id="chat"></div>

    <input id="question" placeholder="Ask something">
    <button onclick="askGemini()">Send</button>

    <script>

        const API_KEY = "AIzaSyDtSSK7cmwoBDmezpAj_4SIHOOREExd23A";

        async function askGemini() {

            const input = document.getElementById("question");
            const chat = document.getElementById("chat");

            const question = input.value;
            if (!question) return;

            chat.innerHTML += `<p class="user"><b>You:</b> ${question}</p>`;
            input.value = "";

            try {

                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        { text: question }
                                    ]
                                }
                            ]
                        })
                    }
                );

                const data = await res.json();

                console.log(data);

                const reply =
                    data.candidates?.[0]?.content?.parts?.[0]?.text ||
                    "Gemini returned empty response";

                chat.innerHTML += `<p class="ai"><b>Gemini:</b> ${reply}</p>`;

            } catch (err) {

                chat.innerHTML += `<p class="ai">Error: ${err.message}</p>`;

            }

        }

    </script>

</body>

</html>
